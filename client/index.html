    <!-- Initial loader styles (prevents flash of unstyled) -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f0fdff 0%, #ffffff 100%);
        font-family: "Geist", "Inter", system-ui, -apple-system, sans-serif;
        color: #0f172a;
      }
      #root {
        min-height: 100vh;
      }
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: linear-gradient(180deg, #f0fdff 0%, #ffffff 100%);
        z-index: 9999;
      }
      .initial-loader-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .initial-loader-ring {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(8, 145, 178, 0.15);
        border-top-color: #0891B2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.95); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="initial-loader">
        <img
          class="initial-loader-logo"
          src="https://pub-1d13f4e7ccfa4575bc04b75045f1b1b1.r2.dev/branding/turboloop-logo.png"
          alt="Turbo Loop"
        />
        <div class="initial-loader-ring"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
