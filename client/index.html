    <!-- Fonts — Geist only, 4 weights (was 3 families × 16 weights = ~150 KB
         saved). Inter dropped (Geist covers all roles). Geist Mono dropped
         from initial load (only used in code blocks on blog posts; loaded
         on-demand by the BlogContent chunk via CSS). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- R2 CDN: every below-the-fold image (reel thumbs, film posters, blog
         covers, language flags, partner logos) is served from this origin.
         Pre-connecting saves the DNS+TLS roundtrip (~150 ms on mobile) when
         the user scrolls past the hero and below-the-fold images start
         loading. -->
    <link
      rel="preconnect"
      href="https://pub-1d13f4e7ccfa4575bc04b75045f1b1b1.r2.dev"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics 4 — deferred to after first interactive paint so it
         doesn't compete with the bundle for network/CPU. The page_view fires
         on every Wouter navigation; we don't need GA loaded before the page
         renders. ~50KB of bandwidth + ~150ms parse time saved on first paint. -->
    <script>
      // Defer GA load until the user is past the initial paint
      function loadGA() {
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=G-7CBRVBSG8H";
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        window.gtag = gtag;
        gtag("js", new Date());
        gtag("config", "G-7CBRVBSG8H", { send_page_view: false });
      }
      // requestIdleCallback if available, else 2s timeout — GA is non-critical
      if ("requestIdleCallback" in window) {
        requestIdleCallback(loadGA, { timeout: 4000 });
      } else {
        window.addEventListener("load", function () {
          setTimeout(loadGA, 1500);
        });
      }
    </script>

    <!-- Initial loader styles (prevents flash of unstyled) -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        /* Prevent horizontal scroll caused by any oversized element / animation */
        overflow-x: hidden;
        /* iOS Safari rubber-band fix */
        overscroll-behavior-x: none;
        background: linear-gradient(180deg, #f0fdff 0%, #ffffff 100%);
        font-family:
          "Geist",
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: #0f172a;
      }
      #root {
        min-height: 100vh;
      }
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: linear-gradient(180deg, #f0fdff 0%, #ffffff 100%);
        z-index: 9999;
      }
      .initial-loader-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .initial-loader-ring {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(8, 145, 178, 0.15);
        border-top-color: #0891b2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(0.95);
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="initial-loader">
        <!-- Inline SVG logo — no R2 round-trip, no CORS console error,
             no ~250 ms wait for the image to fetch before the loader shows. -->
        <svg
          class="initial-loader-logo"
          viewBox="0 0 80 80"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="Turbo Loop"
        >
          <defs>
            <linearGradient id="tlg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0891B2" />
              <stop offset="100%" stop-color="#7C3AED" />
            </linearGradient>
          </defs>
          <circle cx="40" cy="40" r="36" fill="url(#tlg)" opacity="0.12" />
          <circle
            cx="40"
            cy="40"
            r="28"
            fill="none"
            stroke="url(#tlg)"
            stroke-width="4"
            stroke-linecap="round"
            stroke-dasharray="120 60"
            transform="rotate(-90 40 40)"
          />
          <circle cx="40" cy="40" r="10" fill="url(#tlg)" />
        </svg>
        <div class="initial-loader-ring"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
